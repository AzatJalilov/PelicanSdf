name: Bug report
description: Report a reproducible problem in the site or evaluator
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Pelican SDF. Do not disclose security vulnerabilities here; use SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Include the result ID and what you expected.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser, OS, and GPU
      placeholder: Edge 136, Windows 11, NVIDIA…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: "1. Open…\n2. Select…\n3. Observe…"
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console output or screenshots
      render: shell
