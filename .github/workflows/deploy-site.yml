name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pelican-site
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/azatjalilov/pelican-sdf

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Check out repository and history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository history for secrets
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test and build the public bundle
        run: |
          npm test
          npm run build:site
          npm run verify:site

      - name: Scan the generated public bundle
        run: >-
          docker run --rm
          -v "$PWD/dist:/scan:ro"
          zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
          dir /scan --redact --no-banner --exit-code 2

      - id: meta
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: deploy/docker-compose.yml
          sparse-checkout-cone-mode: false

      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: mkdir -p /opt/vibe-overflow/pelican-sdf

      - name: Sync Compose configuration
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/docker-compose.yml
          target: /opt/vibe-overflow/pelican-sdf
          strip_components: 1

      - name: Deploy SHA-tagged image
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          RELEASE_TAG: ${{ needs.build.outputs.image_tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,RELEASE_TAG
          script: |
            set -euo pipefail
            set +x
            cd /opt/vibe-overflow/pelican-sdf
            docker network inspect vibe-overflow-edge >/dev/null 2>&1 \
              || docker network create vibe-overflow-edge >/dev/null
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin >/dev/null
            trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT
            IMAGE_TAG="$RELEASE_TAG" docker compose config --quiet
            IMAGE_TAG="$RELEASE_TAG" docker compose pull pelican
            touch .env
            chmod 600 .env
            sed -i '/^IMAGE_TAG=/d' .env
            printf 'IMAGE_TAG=%s\n' "$RELEASE_TAG" >> .env
            docker compose up -d --remove-orphans
            for attempt in 1 2 3 4 5 6; do
              status="$(docker inspect --format '{{.State.Health.Status}}' pelican-sdf 2>/dev/null || true)"
              if [ "$status" = healthy ]; then
                docker image prune -f >/dev/null
                exit 0
              fi
              echo "health attempt $attempt: ${status:-not-running}"
              sleep 5
            done
            docker compose logs --tail=100 pelican
            exit 1

      - name: Smoke-check public website
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            if curl -fsS --max-time 15 -o /dev/null https://pelican.vibe-overflow.com/ \
              && curl -fsS --max-time 15 -o /dev/null https://pelican.vibe-overflow.com/results.html \
              && curl -fsS --max-time 15 -o /dev/null https://pelican.vibe-overflow.com/data/manifest.json; then
              echo "Pelican SDF is live"
              exit 0
            fi
            echo "public smoke attempt $attempt failed"
            sleep 5
          done
          exit 1
